<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D-Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ===== START SCREEN ===== -->
    <div id="startScreen" class="start-screen">

        <!-- Animated stars background (CSS only) -->
        <div class="stars-container">
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
        </div>

        <!-- Content -->
        <div class="start-content">
            <h1 class="game-title">
                <span class="title-main">GALAXY</span>
                <span class="title-sub">DEFENDER</span>
            </h1>

            <p class="tagline">Defend the galaxy from alien invaders</p>

            <!-- Controls guide -->
            <div class="controls-box">
                <div class="control-row">
                    <span class="key-badge">← →</span>
                    <span class="control-label">or</span>
                    <span class="key-badge">A D</span>
                    <span class="control-label">Move</span>
                </div>
                <div class="control-row">
                    <span class="key-badge">SPACE</span>
                    <span class="control-label">Shoot</span>
                </div>
            </div>

            <!-- Start button -->
            <button id="startBtn" class="start-btn">START GAME</button>
        </div>
    </div>

    <!-- ===== GAME AREA (hidden until start) ===== -->
    <div id="gameArea" class="game-area hidden">
        <canvas id="gameCanvas"></canvas>
        <p class="placeholder-msg">🎮 Game will load here...</p>
    </div>

</body>

</html>
