<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shooter</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="GamePage.css">
    <link rel="icon" type="image/png" href="../assests/icons8-gun-100.png">
    <script>
        // Check for page reload - redirect to Start Page immediately if refreshed
        if (String(window.performance.getEntriesByType("navigation")[0]?.type) === "reload" || 
            (window.performance && window.performance.navigation && window.performance.navigation.type === 1)) {
            window.location.href = '../StartPage/StartPage.html';
        }
    </script>
</head>

<body class="bg-dark overflow-hidden">
    <!-- Full-screen Game Surface -->
    <main id="game-surface" class="position-relative vw-100 vh-100">

        <!-- Score component -->
        <div class="score-card px-4 py-2 text-center shadow-lg">
            <span id="player-display-name" class="d-block small text-white opacity-75 mb-1 text-truncate" style="font-weight: 500; max-width: 120px; margin: 0 auto;">Pilot</span>
            <span class="score-label d-block text-uppercase">Score</span>
            <span id="score-value" class="score-number d-block">0</span>
        </div>

        <!-- Player component -->
        <div class="player-character" id="player">
            <div class="player-icon">
                <div class="inner-circle"></div>
            </div>
            <div class="player-pointer"></div>
        </div>

        <!-- Game Over Overlay -->
        <div id="game-over" class="game-over-overlay d-none">
            <div class="game-over-box p-5 text-center shadow-lg">
                <h2 class="display-3 fw-bold mb-3 d-flex align-items-center justify-content-center gap-3">
                    <img src="../assests/icons8-gun-100.png" alt="Gun Icon" style="width: 50px; height: 50px; filter: drop-shadow(0 0 10px #ff4757);">
                    GAME OVER
                </h2>
                <p class="lead mb-4">Final Score: <span id="final-score" class="fw-bold">0</span></p>
                
                <!-- Leaderboard Section -->
                <div class="leaderboard-container mb-4 text-start">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="text-uppercase mb-0" style="color: var(--score-accent); letter-spacing: 2px; font-size: 0.9rem;">High Scores</h5>
                        <button onclick="clearHighScores()" class="btn btn-link p-0 text-decoration-none text-muted small" style="font-size: 0.6rem;">Reset</button>
                    </div>
                    <div id="leaderboard-list" class="list-group list-group-flush">
                        <!-- Scores will be injected here -->
                    </div>
                </div>

                <div class="d-flex flex-column flex-sm-row justify-content-center gap-2 gap-sm-3">
                    <button class="btn btn-primary btn-lg px-4" onclick="restartGame()">Restart</button>
                    <button class="btn btn-outline-light btn-lg px-4" onclick="window.location.href='../StartPage/StartPage.html'">Go to Home</button>
                </div>
            </div>
        </div>

        <!-- Pause Overlay -->
        <div id="pause-screen" class="pause-overlay d-none">
            <div class="pause-box p-5 text-center shadow-lg">
                <h2 class="display-4 fw-bold mb-3">PAUSED</h2>
                <p class="mb-4">Press <strong>ESC</strong> to Resume</p>
                <button class="btn btn-outline-info btn-lg px-5" onclick="togglePause()">Resume</button>
            </div>
        </div>

    </main>

    <!-- Game Logic & Interaction -->
    <script src="GamePage.js"></script>
    <!-- Bootstrap JS bundles -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
