<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D-Game</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="StartPage.css">
</head>

<body>

    <div id="gameStartContainer"
        class="game-start-container vh-100 d-flex align-items-center justify-content-center overflow-hidden">

        <div class="container z-1">
            <div class="row justify-content-center">
                <div class="col-11 col-sm-10 col-md-8 col-lg-6 col-xl-5">
                    <div class="game-start-card text-center p-4 p-md-5">
                        <div class="game-start-header mb-3">
                            <h1 class="game-start-title fw-black text-uppercase mb-0">Galaxy</h1>
                            <h2 class="game-start-subtitle fw-semibold text-uppercase">Defender</h2>
                        </div>

                        <p class="game-start-tagline mb-4 opacity-75">Defend the galaxy from alien invaders</p>

                        <div class="game-controls-container p-3 mb-4 rounded-3">
                            <div class="row g-2 align-items-center justify-content-center mb-2">
                                <div class="col-auto">
                                    <span class="game-key-hint">← →</span>
                                </div>
                                <div class="col-auto">
                                    <span class="game-accent-text small">or</span>
                                </div>
                                <div class="col-auto">
                                    <span class="game-key-hint">A D</span>
                                </div>
                                <div class="col-auto">
                                    <span class="game-accent-text small">Move</span>
                                </div>
                            </div>
                            <div class="row g-2 align-items-center justify-content-center">
                                <div class="col-auto">
                                    <span class="game-key-hint px-3">SPACE</span>
                                </div>
                                <div class="col-auto">
                                    <span class="game-accent-text small">Shoot</span>
                                </div>
                            </div>
                        </div>

                        <div class="d-grid gap-2 col-8 col-md-6 mx-auto">
                            <button id="startGameButton"
                                class="btn game-btn-primary btn-lg rounded-pill fw-bold text-uppercase py-3">
                                Start Game
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
