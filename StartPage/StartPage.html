<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shooter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="StartPage.css">
    <link rel="icon" type="image/png" href="../assests/icons8-gun-100.png">
</head>

<body>

    <div id="gameStartContainer" class="game-start-container overflow-hidden">
        <div class="container z-1">
            <div class="row justify-content-center mx-0">
                <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">
                    <div class="game-start-card text-center p-4 p-md-5">
                        <div class="game-start-header mb-4">
                            <h1 class="game-start-title fw-black text-uppercase mb-1 d-flex align-items-center justify-content-center gap-2">
                                <img src="../assests/icons8-gun-100.png" alt="Gun Icon" style="width: 45px; height: 45px; filter: drop-shadow(0 0 10px var(--brand-primary));">
                                Shooter
                            </h1>
                            <h2 class="game-start-subtitle fw-bold text-uppercase">Galaxy Defender</h2>
                        </div>

                        <p class="game-start-tagline text-muted mb-4 px-3">Defend the galaxy from relentless alien
                            invaders</p>

                        <div class="game-controls-container p-3 p-md-4 mb-4 rounded-4 position-relative">
                            <div class="control-header mb-3">
                                <span class="text-uppercase tiny-label">Control Guide</span>
                            </div>
                            
                            <!-- Desktop Controls -->
                            <div class="desktop-controls">
                                <div class="row g-3 align-items-center justify-content-center">
                                    <div class="col-auto text-end">
                                        <div class="kbm-hint mb-2">
                                            <span class="game-key-hint">←</span>
                                            <span class="game-key-hint">→</span>
                                            <span class="ms-1 tiny-label">Move</span>
                                        </div>
                                        <div class="kbm-hint">
                                            <span class="game-key-hint px-3">SPACE</span>
                                            <span class="ms-1 tiny-label">Shoot</span>
                                        </div>
                                    </div>
                                    <div class="col-auto d-none d-md-block border-start border-secondary opacity-25" style="height: 40px;"></div>
                                    <div class="col text-start d-none d-md-block">
                                        <p class="mb-0 small text-muted">Use <span class="text-white">A / D</span> or <span class="text-white">Arrows</span> to navigate and <span class="text-white">SPACE</span> to fire.</p>
                                    </div>
                                </div>
                            </div>

                            <!-- Mobile Controls Hint -->
                            <div class="mobile-controls d-none">
                                <div class="d-flex flex-column align-items-center">
                                    <div class="drag-badge mb-3">
                                        <div class="drag-icon-anim"></div>
                                        <span>DRAG TO MOVE</span>
                                    </div>
                                    <div class="desc-line">
                                        <span class="game-accent-text small text-uppercase">Auto-Firing Enabled</span>
                                    </div>
                                    <p class="mt-2 mb-0 x-small text-muted px-2">Slide your finger left or right to control the ship.</p>
                                </div>
                            </div>
                        </div>

                        <!-- Name Input Section -->
                        <div class="mb-4">
                            <label for="playerName" class="form-label text-uppercase small fw-bold mb-2" style="color: var(--brand-accent);">Identify Yourself, Pilot</label>
                            <input type="text" id="playerName" class="form-control bg-dark border-secondary text-white text-center rounded-pill py-2" placeholder="Enter Name" maxlength="15" autocomplete="off">
                        </div>

                        <div class="d-grid gap-2 col-10 col-md-8 mx-auto mt-2">
                            <button id="startGameButton"
                                class="btn game-btn-primary btn-lg rounded-pill fw-black text-uppercase py-3">
                                Start Mission
                            </button>
                        </div>

                        <div id="highScorePreview" class="mt-4 p-3 rounded-4" style="background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05);">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <h6 class="text-uppercase small fw-bold mb-0" style="color: var(--brand-primary); letter-spacing: 2px;">Hall of Fame</h6>
                                <button onclick="clearHighScores()" class="btn btn-link p-0 text-decoration-none text-muted small" style="font-size: 0.65rem; transition: color 0.3s;">Clear Records</button>
                            </div>
                            <div id="topScoreList" class="small">
                                <!-- Top scores will be loaded here -->
                                <span class="text-muted">Loading scores...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('startGameButton').addEventListener('click', function() {
            const nameField = document.getElementById('playerName');
            const nameInput = nameField.value.trim();
            
            // Validation: Prevent entry if name is empty
            if (!nameInput) {
                nameField.classList.add('is-invalid');
                nameField.placeholder = "Pilot Name Required!";
                nameField.style.borderColor = "var(--brand-accent)";
                nameField.focus();
                
                // Shake effect for feedback
                nameField.parentElement.animate([
                    { transform: 'translateX(0)' },
                    { transform: 'translateX(-10px)' },
                    { transform: 'translateX(10px)' },
                    { transform: 'translateX(0)' }
                ], { duration: 300 });
                
                return;
            }

            // Store name for the game session
            sessionStorage.setItem('currentPlayerName', nameInput);

            // Add a slight delay for a potential transition effect or just navigate directly
            this.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Initializing...';
            this.disabled = true;
            
            setTimeout(() => {
                window.location.href = '../GamePage/GamePage.html';
            }, 600);
        });

        // Clear validation style on input
        document.getElementById('playerName').addEventListener('input', function() {
            this.classList.remove('is-invalid');
            this.style.borderColor = "rgba(255,255,255,0.1)";
        });

        // Load High Scores for Hall of Fame
        function loadHighScores() {
            const scoreList = document.getElementById('topScoreList');
            const highScores = JSON.parse(localStorage.getItem('shooter_high_scores')) || [];
            
            if (highScores.length === 0) {
                scoreList.innerHTML = '<span class="text-muted fst-italic">No records yet. Be the first!</span>';
                return;
            }

            // Show top 3
            scoreList.innerHTML = highScores.slice(0, 3).map((s, i) => `
                <div class="d-flex justify-content-between align-items-center mb-1 overflow-hidden">
                    <span class="text-truncate me-2"><span class="text-info">#${i+1}</span> <span class="name-span">${s.name || 'Anonymous'}</span></span>
                    <span class="fw-bold text-white flex-shrink-0">${s.score} pts</span>
                </div>
            `).join('');
        }

        function clearHighScores() {
            if (confirm('Are you sure you want to delete all high scores?')) {
                localStorage.removeItem('shooter_high_scores');
                loadHighScores();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadHighScores();
            
            // Detect touch device
            if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
                const mobileControls = document.querySelector('.mobile-controls');
                const desktopControls = document.querySelector('.desktop-controls');
                if (mobileControls) mobileControls.classList.remove('d-none');
                if (desktopControls) desktopControls.classList.add('d-none');
            }
        });
    </script>
</body>

</html>
