<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D-Game</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="StartPage.css">
</head>

<body>

    <div id="gameStartContainer" class="game-start-container overflow-hidden">
        <div class="container z-1">
            <div class="row justify-content-center mx-0">
                <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">
                    <div class="game-start-card text-center p-4 p-md-5">
                        <div class="game-start-header mb-4">
                            <h1 class="game-start-title fw-black text-uppercase mb-1">Galaxy</h1>
                            <h2 class="game-start-subtitle fw-bold text-uppercase">Defender</h2>
                        </div>

                        <p class="game-start-tagline text-muted mb-4 px-3">Defend the galaxy from relentless alien invaders</p>

                        <div class="game-controls-container p-3 mb-4 rounded-4">
                            <div class="row g-2 align-items-center justify-content-center mb-3">
                                <div class="col-auto">
                                    <span class="game-key-hint">← →</span>
                                </div>
                                <div class="col-auto">
                                    <span class="game-accent-text small fw-light px-1">or</span>
                                </div>
                                <div class="col-auto">
                                    <span class="game-key-hint">A D</span>
                                </div>
                                <div class="col-auto ms-2">
                                    <span class="game-accent-text small text-uppercase fw-bold">Move</span>
                                </div>
                            </div>
                            <div class="row g-2 align-items-center justify-content-center">
                                <div class="col-auto">
                                    <span class="game-key-hint px-3">SPACE</span>
                                </div>
                                <div class="col-auto ms-2">
                                    <span class="game-accent-text small text-uppercase fw-bold">Shoot</span>
                                </div>
                            </div>
                        </div>

                        <div class="d-grid gap-2 col-10 col-md-8 mx-auto mt-2">
                            <button id="startGameButton"
                                class="btn game-btn-primary btn-lg rounded-pill fw-black text-uppercase py-3">
                                Start Mission
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
